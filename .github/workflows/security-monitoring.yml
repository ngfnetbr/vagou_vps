name: Security Monitoring

on:
  pull_request: {}
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

jobs:
  security:
    name: SAST + Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build

      - name: NPM Audit (high+)
        run: npm audit --audit-level=high
