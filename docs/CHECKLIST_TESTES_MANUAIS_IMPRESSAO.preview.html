<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview - Checklist de Testes Manuais</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      body {
        margin: 0;
        background: #f5f5f5;
        color: #111827;
        font-family: Arial, sans-serif;
      }

      main {
        max-width: 900px;
        margin: 24px auto;
        padding: 40px;
        background: #ffffff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      h1,
      h2,
      h3 {
        color: #111827;
      }

      p,
      li {
        line-height: 1.5;
      }

      ul {
        padding-left: 20px;
      }

      code {
        background: #f3f4f6;
        padding: 2px 4px;
        border-radius: 4px;
      }

      hr {
        border: 0;
        border-top: 1px solid #e5e7eb;
        margin: 24px 0;
      }

      @media print {
        body {
          background: #ffffff;
        }

        main {
          box-shadow: none;
          margin: 0;
          max-width: none;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main id="content">Carregando preview...</main>
    <script>
      fetch("./CHECKLIST_TESTES_MANUAIS_IMPRESSAO.md")
        .then((response) => response.text())
        .then((markdown) => {
          document.getElementById("content").innerHTML = marked.parse(markdown);
        })
        .catch(() => {
          document.getElementById("content").textContent =
            "Nao foi possivel carregar o checklist.";
        });
    </script>
  </body>
</html>
